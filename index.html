// Free straight-line backbone — no angle restriction
function freePoint(x1, y1) {
  return { x: x1, y: y1 };
}

// Returns perpendicular unit vectors for a backbone segment
// perp1 = 90deg CCW, perp2 = 90deg CW
function perpsOfSegment(bb, segIdx) {
  const a = bb[segIdx], b = bb[segIdx + 1];
  if (!a || !b) return [{ dx:0, dy:-1 }, { dx:0, dy:1 }];
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.hypot(dx, dy) || 1;
  return [
    { dx: -dy / len, dy:  dx / len },  // CCW
    { dx:  dy / len, dy: -dx / len },  // CW
  ];
}

// ─── STEP 2: HARNESS DESIGNER ─────────────────────────────────────────────────
function Step2({harness,setHarness,onNext,onBack,isSandbox}) {
  const [phase,setPhase]           = useState("backdrop");
  const [presetId,setPresetId]     = useState("");
  const [preambleSeen,setPreambleSeen] = useState(false); // backdrop preamble
  const [backbonePreambleSeen,setBackbonePreambleSeen] = useState(false);
  const [nodesPreambleSeen,setNodesPreambleSeen]       = useState(false);
  const [uploadImg,setUploadImg]   = useState(null);

  // Backbone: array of {x,y}, built point-by-point with 15° snap
  const [bb,setBb]                 = useState([]);      // committed points
  const [preview,setPreview]       = useState(null);    // snapped preview of next point
  const [placing,setPlacing]       = useState(false);
  const [editSegIdx,setEditSegIdx] = useState(null); // which seg is being labelled inline
  const [editSegVal,setEditSegVal] = useState("");    // current value being typed

  // Per-segment inch values
  const [bbSegs,setBbSegs]         = useState([]);

  // Nodes
  const [nodes,setNodes]           = useState([]);
  const [pending,setPending]       = useState(null);
  const [editId,setEditId]         = useState(null);
  const [draggingNode,setDraggingNode] = useState(null); // id of node being dragged
  // Inter-node distances along backbone: key = "nodeA_id:nodeB_id" (sorted order), value = inches string
  const [interNodeDist,setInterNodeDist] = useState({});

  const svgRef      = useRef(null);
  const fileRef     = useRef(null);
  const containerRef = useRef(null);

  const CW=700, CH=440;   // canvas logical size

  // Zoom/pan state
  const [zoom,setZoom]     = useState(1);
  const [pan,setPan]       = useState({x:0,y:0});
  const [panning,setPanning] = useState(false);
  const panStart           = useRef(null);
  const nodeDragMoved      = useRef(false);  // true if mouse moved during node drag
  const [draggingBox,setDraggingBox]     = useState(null); // {id, startMx, startMy, origDx, origDy}
  const [draggingBranch,setDraggingBranch] = useState(null); // {id} — dragging branch tip to resize
  const [showSegDims,setShowSegDims]     = useState(true);  // show/hide backbone segment dim tags

  // Keep bbSegs in sync with bb length
  useEffect(()=>{
    if(bb.length<2){setBbSegs([]);return;}
    setBbSegs(p=>{
      const n=[];
      for(let i=0;i<bb.length-1;i++) n.push(p[i]||{in:""});
      return n;
    });
  },[bb.length]);

  // SVG coordinate helper — maps screen px → canvas logical coords accounting for zoom/pan
  const pt = useCallback((e)=>{
    const r=svgRef.current?.getBoundingClientRect();
    if(!r) return {x:0,y:0};
    // Screen pos relative to SVG element
    const sx=(e.clientX-r.left)*(CW/r.width);
    const sy=(e.clientY-r.top)*(CH/r.height);
    // Invert zoom/pan transform: canvas_coord = (screen - pan) / zoom
    return {x:(sx-pan.x)/zoom, y:(sy-pan.y)/zoom};
  },[zoom,pan]);

  // Closest point on backbone polyline
  const closestOnBb = useCallback((mx,my)=>{
    if(bb.length<2) return null;
    let best={dist:9999,i:0,t:0,x:0,y:0};
    for(let i=0;i<bb.length-1;i++){
      const ax=bb[i].x,ay=bb[i].y,bx=bb[i+1].x,by=bb[i+1].y;
      const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
      if(!l2) continue;
      const t=Math.max(0,Math.min(1,((mx-ax)*dx+(my-ay)*dy)/l2));
      const px=ax+t*dx,py=ay+t*dy,d=Math.hypot(mx-px,my-py);
      if(d<best.dist) best={dist:d,i,t,x:px,y:py};
    }
    return best;
  },[bb]);

  // ── Backdrop ──
  const bdReady = presetId!==""&&(presetId!=="upload"||!!uploadImg);

  const handleUpload = e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{setUploadImg(ev.target.result);setPresetId("upload");};
    r.readAsDataURL(f);
  };

  // ── Backbone click-to-place ──
  const handleCanvasClick = e=>{
    const pos=pt(e);

    if(phase==="backbone"){
      if(!placing){
        setBb([pos]);
        setPlacing(true);
      } else {
        setBb(p=>[...p,pos]);
      }
      return;
    }

    if(phase==="nodes"){
      const c=closestOnBb(pos.x,pos.y);
      if(!c||c.dist>22) return;
      // Snap to backbone endpoints if click is within the red ring (r=14) of either end
      const EP_SNAP=18;
      let snapped=null;
      if(bb.length>=2){
        if(Math.hypot(pos.x-bb[0].x,pos.y-bb[0].y)<EP_SNAP)
          snapped={x:bb[0].x,y:bb[0].y,ix:0,t:0};
        else if(Math.hypot(pos.x-bb[bb.length-1].x,pos.y-bb[bb.length-1].y)<EP_SNAP)
          snapped={x:bb[bb.length-1].x,y:bb[bb.length-1].y,ix:bb.length-2,t:1};
      }
      const sx = snapped ? snapped.x : c.x;
      const sy = snapped ? snapped.y : c.y;
      const six = snapped ? snapped.ix : c.i;
      const st  = snapped ? snapped.t  : c.t;
      // Determine which perpendicular side the click is on
      const perps = perpsOfSegment(bb, six);
      const clickDx = pos.x - sx, clickDy = pos.y - sy;
      const dot0 = clickDx*perps[0].dx + clickDy*perps[0].dy;
      const perpDir = dot0 >= 0 ? perps[0] : perps[1];
      setPending({id:uid(),ix:six,t:st,x:sx,y:sy,perpDir,label:"",len:""});
      setEditId(null);
    }
  };

  const handleMouseMove = e=>{
    if(draggingBox){
      const r=svgRef.current?.getBoundingClientRect();
      if(!r) return;
      const scaleX=CW/r.width, scaleY=CH/r.height;
      const dmx=(e.clientX-draggingBox.startMx)*scaleX/zoom;
      const dmy=(e.clientY-draggingBox.startMy)*scaleY/zoom;
      setNodes(prev=>prev.map(n=>n.id===draggingBox.id
        ?{...n,boxOffset:{dx:draggingBox.origDx+dmx,dy:draggingBox.origDy+dmy}}
        :n));
      return;
    }
    if(draggingBranch){
      const pos=pt(e);
      setNodes(prev=>prev.map(n=>{
        if(n.id!==draggingBranch) return n;
        const pd=n.perpDir||{dx:0,dy:-1};
        // Project mouse onto perpendicular axis — purely visual, never mutates n.len
        const proj=(pos.x-n.x)*pd.dx+(pos.y-n.y)*pd.dy;
        const newPx=Math.max(8,proj);
        return {...n,visualBranchPx:newPx};
      }));
      return;
    }
    if(draggingNode){
      nodeDragMoved.current=true;
      const pos=pt(e);
      const c=closestOnBb(pos.x,pos.y);
      if(c){
        const perps=perpsOfSegment(bb,c.i);
        const clickDx=pos.x-c.x, clickDy=pos.y-c.y;
        const dot0=clickDx*perps[0].dx+clickDy*perps[0].dy;
        const perpDir=dot0>=0?perps[0]:perps[1];
        setNodes(prev=>prev.map(n=>n.id===draggingNode
          ?{...n,x:c.x,y:c.y,ix:c.i,t:c.t,perpDir}
          :n));
      }
      return;
    }
    if(phase==="backbone"&&placing&&bb.length>0){
      const pos=pt(e);
      setPreview(pos);
    } else if(preview) setPreview(null);
  };

  const finishBb=()=>{setPlacing(false);setPreview(null);};
  const resetBb=()=>{setBb([]);setBbSegs([]);setPlacing(false);setPreview(null);setNodes([]);setInterNodeDist({});};

  // ── Zoom/pan handlers ──────────────────────────────────────────────────────
  const handleWheel = e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
    setZoom(z => {
      const nz = Math.max(0.5, Math.min(8, z*factor));
      // Zoom toward cursor
      const r=svgRef.current?.getBoundingClientRect();
      if(!r) return nz;
      const cx=(e.clientX-r.left)*(CW/r.width);
      const cy=(e.clientY-r.top)*(CH/r.height);
      setPan(p=>({x: cx-(cx-p.x)*(nz/z), y: cy-(cy-p.y)*(nz/z)}));
      return nz;
    });
  };
  const handleMouseDown = e => {
    if(e.button===1||(e.button===0&&e.altKey)){
      e.preventDefault();
      setPanning(true);
      panStart.current={mx:e.clientX,my:e.clientY,px:pan.x,py:pan.y};
    }
  };
  const handleMouseUp = e => {
    if(panning) setPanning(false);
    if(draggingNode) setDraggingNode(null);
    if(draggingBox) setDraggingBox(null);
    if(draggingBranch) setDraggingBranch(null);
  };
  const handlePanMove = e => {
    if(!panning||!panStart.current) return;
    const r=svgRef.current?.getBoundingClientRect();
    if(!r) return;
    const scaleX=CW/r.width, scaleY=CH/r.height;
    setPan({
      x: panStart.current.px+(e.clientX-panStart.current.mx)*scaleX,
      y: panStart.current.py+(e.clientY-panStart.current.my)*scaleY,
    });
  };
  const resetView = () => { setZoom(1); setPan({x:0,y:0}); };

  // ── Nodes ──
  const confirmNode=()=>{
    if(!pending||!pending.label.trim()) return;
    const epNode = bb.length>=2&&(
      Math.hypot(pending.x-bb[0].x,pending.y-bb[0].y)<18||
      Math.hypot(pending.x-bb[bb.length-1].x,pending.y-bb[bb.length-1].y)<18
    );
    if(!epNode&&!pending.len.trim()) return;
    setNodes(p=>[...p,{...pending,isEndpoint:epNode,boxOffset:{dx:0,dy:0}}]);
    setPending(null);
  };
  const removeNode=id=>{
    setNodes(p=>p.filter(n=>n.id!==id));
    // Remove any inter-node dist entries that referenced this node
    setInterNodeDist(prev=>{
      const next={};
      Object.entries(prev).forEach(([k,v])=>{if(!k.includes(id)) next[k]=v;});
      return next;
    });
  };
  const updNode=(id,k,v)=>setNodes(p=>p.map(n=>n.id===id?{...n,[k]:v}:n));
  const updSeg=(i,v)=>setBbSegs(p=>p.map((s,j)=>j===i?{...s,in:v}:s));

  const bbFullyDimensioned=()=>{
    if(bb.length<2) return false;
    for(let i=0;i<bb.length-1;i++) if(!bbSegs[i]?.in?.trim()) return false;
    return true;
  };

  // Check endpoint nodes exist (first and last backbone point)
  const endpointsNodedCheck=()=>{
    if(bb.length<2||nodes.length<2) return false;
    const SNAP=18; // px tolerance
    const hasStart=nodes.some(n=>Math.hypot(n.x-bb[0].x,n.y-bb[0].y)<SNAP);
    const hasEnd  =nodes.some(n=>Math.hypot(n.x-bb[bb.length-1].x,n.y-bb[bb.length-1].y)<SNAP);
    return hasStart&&hasEnd;
  };

  const isEndpointNode = n => {
    if(bb.length<2) return false;
    const SNAP=18;
    return Math.hypot(n.x-bb[0].x,n.y-bb[0].y)<SNAP ||
           Math.hypot(n.x-bb[bb.length-1].x,n.y-bb[bb.length-1].y)<SNAP;
  };

  // Return nodes sorted by backbone position (segment index + t within segment)
  const sortedNodes = () => {
    return [...nodes].sort((a,b)=>(a.ix+a.t)-(b.ix+b.t));
  };

  // Generate the ordered list of inter-node gaps: [{key, labelA, labelB}]
  const interNodeGaps = () => {
    const sorted = sortedNodes();
    if(sorted.length<2) return [];
    const gaps = [];
    for(let i=0;i<sorted.length-1;i++){
      const a=sorted[i], b=sorted[i+1];
      const key=[a.id,b.id].sort().join(":");
      gaps.push({key, a, b});
    }
    return gaps;
  };

  const updInterNode = (key,val) =>
    setInterNodeDist(prev=>({...prev,[key]:val}));

  const interNodeDone = () => {
    if(nodes.length<2) return true; // no gaps to fill
    const gaps = interNodeGaps();
    return gaps.every(g=>interNodeDist[g.key]?.trim());
  };

  const allDone=()=>{
    if(!bbFullyDimensioned()||!nodes.length) return false;
    for(const n of nodes){
      if(!n.label.trim()) return false;
      if(!isEndpointNode(n)&&!n.len.trim()) return false;
    }
    if(!endpointsNodedCheck()) return false;
    if(!interNodeDone()) return false;
    return true;
  };

  const handleSubmit=()=>{
    setHarness(h=>({...h,backdropId:presetId,backdropImage:uploadImg,
                       backbone:bb,bbSegs,nodes}));
    if(!isSandbox) onNext();
    else setSandboxDone(true);
  };
  const [sandboxDone,setSandboxDone] = useState(false);

  // ── Visual ──
  const acData = AC[presetId] || null;

  // Segment midpoints for dimension tags
  const segMids = bb.slice(0,-1).map((p,i)=>({
    x:(p.x+bb[i+1].x)/2, y:(p.y+bb[i+1].y)/2
  }));

  const previewDeg = null; // no angle snap

  const phaseLabel = {
    backdrop:"2a — Select Aircraft",
    backbone:"2b — Draw Backbone",
    nodes:"2c — Add Nodes & Dimensions",
  }[phase];

  if(phase==="backdrop"&&!preambleSeen) return (
    <div className="fu" style={{display:"flex",flexDirection:"column",alignItems:"center",
                                justifyContent:"center",height:"calc(100vh - 56px)",
                                background:C.bg,padding:"0 32px"}}>
      <div style={{maxWidth:600,width:"100%"}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.18em",textTransform:"uppercase",
                     color:C.red,marginBottom:20,fontFamily:FONT}}>
          Harness Designer — Step 1 of 3
        </div>
        <h2 style={{fontSize:28,fontWeight:800,color:C.textHi,fontFamily:FONT,
                    marginBottom:16,lineHeight:1.2}}>
          Select a Backdrop
        </h2>
        <div style={{width:48,height:3,background:C.red,borderRadius:2,marginBottom:24}}/>
        <div style={{fontSize:14,color:C.textMid,fontFamily:FONT,lineHeight:1.8,marginBottom:16}}>
          Use this step to select which aircraft design you want to use as the foundation for your
          wiring harness layout. Choosing a pre-drawn backdrop gives you an accurate top-down
          silhouette of your aircraft to work from, so you can route the backbone and place nodes
          in the correct positions relative to the airframe.
        </div>
        <div style={{fontSize:14,color:C.textMid,fontFamily:FONT,lineHeight:1.8,marginBottom:32}}>
          If your aircraft is not listed among the available presets, you can upload your own
          reference image — a top-down photograph or scale drawing works best. Once a backdrop
          is selected, you will proceed to draw the harness backbone in Step 2.
        </div>
        <BtnPrimary onClick={()=>setPreambleSeen(true)}>
          Continue — Select an Outline →
        </BtnPrimary>
      </div>
    </div>
  );

  if(phase==="backbone"&&!backbonePreambleSeen) return (
    <div className="fu" style={{display:"flex",flexDirection:"column",alignItems:"center",
                                justifyContent:"center",height:"calc(100vh - 56px)",
                                background:C.bg,padding:"0 32px"}}>
      <div style={{maxWidth:600,width:"100%"}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.18em",textTransform:"uppercase",
                     color:C.red,marginBottom:20,fontFamily:FONT}}>
          Harness Designer — Step 2 of 3
        </div>
        <h2 style={{fontSize:28,fontWeight:800,color:C.textHi,fontFamily:FONT,
                    marginBottom:16,lineHeight:1.2}}>
          Draw the Backbone
        </h2>
        <div style={{width:48,height:3,background:C.red,borderRadius:2,marginBottom:24}}/>
        <div style={{fontSize:14,color:C.textMid,fontFamily:FONT,lineHeight:1.8,marginBottom:16}}>
          The backbone is the main trunk of your wiring harness — the primary cable run that all
          branches connect to. In this step you will trace the backbone's path across the aircraft
          by clicking on the canvas to place a series of connected points. Each segment between
          points represents a straight run of wire bundle.
        </div>
        <div style={{fontSize:14,color:C.textMid,fontFamily:FONT,lineHeight:1.8,marginBottom:16}}>
          After placing your points, double-click or press the Finish button to lock the backbone.
          You will then be prompted to enter the physical length of each segment in inches, which
          will be used to generate accurate dimensions on the final drawing.
        </div>
        <div style={{fontSize:14,color:C.textMid,fontFamily:FONT,lineHeight:1.8,marginBottom:32}}>
          Tip: scroll to zoom in on any area of the canvas for precision placement, and use
          Alt + drag or the middle mouse button to pan.
        </div>
        <BtnPrimary onClick={()=>setBackbonePreambleSeen(true)}>
          Continue — Draw the Backbone →
        </BtnPrimary>
      </div>
    </div>
  );

  if(phase==="nodes"&&!nodesPreambleSeen) return (
    <div className="fu" style={{display:"flex",flexDirection:"column",alignItems:"center",
                                justifyContent:"center",height:"calc(100vh - 56px)",
                                background:C.bg,padding:"0 32px"}}>
      <div style={{maxWidth:600,width:"100%"}}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.18em",textTransform:"uppercase",
                     color:C.red,marginBottom:20,fontFamily:FONT}}>
          Harness Designer — Step 3 of 3
        </div>
        <h2 style={{fontSize:28,fontWeight:800,color:C.textHi,fontFamily:FONT,
                    marginBottom:16,lineHeight:1.2}}>
          Add Nodes &amp; Dimensions
        </h2>
        <div style={{width:48,height:3,background:C.red,borderRadius:2,marginBottom:24}}/>
        <div style={{fontSize:14,color:C.textMid,fontFamily:FONT,lineHeight:1.8,marginBottom:16}}>
          Nodes represent the branch points where individual wire runs leave the backbone to reach
          avionics, sensors, lights, and other equipment. Click anywhere near the backbone to place
          a node at that location. Each node requires a label identifying the connected equipment

        </div>
        <div style={{fontSize:14,color:C.textMid,fontFamily:FONT,lineHeight:1.8,marginBottom:16}}>

        </p>
        <div style={{background:C.surface,borderRadius:10,padding:"16px 20px",
                     border:`1px solid ${C.border}`,marginBottom:28,
                     fontSize:13,color:C.textMid,fontFamily:FONT,lineHeight:1.8}}>

          <a href="tel:9899482046" style={{color:C.red,textDecoration:"none",fontWeight:700}}>(989) 948-2046</a>
          {" · "}
          <a href="mailto:Sales@LeadingEdgeAero.cloud" style={{color:C.red,textDecoration:"none",fontWeight:700}}>Sales@LeadingEdgeAero.cloud</a>
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"center"}}>
          <BtnGhost onClick={()=>setSandboxDone(false)}>← Back to Sandbox</BtnGhost>
          <BtnPrimary onClick={onBack}>Start Real Project →</BtnPrimary>
        </div>
      </div>
    </div>
  );

  return <div className="fu" style={{display:"flex",flexDirection:"column",

    {/* Sub-step bar */}
    <div style={{background:C.bgDeep,borderBottom:`1px solid ${C.border}`,
                 padding:"0 20px",display:"flex",alignItems:"center",flexShrink:0,height:40}}>
      {["backdrop","backbone","nodes"].map((p,i)=>{
        const active=phase===p;

            border:active?"none":done?`1px solid ${C.red}`:`1px solid ${C.border}`,

            fontSize:9,fontWeight:800,fontFamily:FONT,
            letterSpacing:"0.10em",textTransform:"uppercase",
            color:active?"#fff":done?C.red:C.textDim,
            boxShadow:active?`0 0 10px ${C.redGlow}`:"none",
            whiteSpace:"nowrap",transition:"all 0.2s",flexShrink:0}}>
            {done&&!active?`✓ Step ${i+1}`:`Step ${i+1}`}
          </div>
          <span style={{fontSize:11,fontWeight:600,fontFamily:FONT,
                        color:active?C.textHi:C.textMid}}>
            {labels[i]}
          </span>
        </div>;

      <span style={{marginLeft:"auto",fontSize:10,color:C.textDim,fontFamily:FONT}}>{phaseLabel}</span>
      {isSandbox&&<div style={{marginLeft:16,background:"rgba(255,200,0,0.15)",
        border:"1px solid #cc8800",borderRadius:5,padding:"2px 10px",

    <div style={{flex:1,display:"flex",overflow:"hidden"}}>

      {/* ─── LEFT PANEL ─── */}
      <div style={{width:248,background:C.bgDeep,borderRight:`1px solid ${C.border}`,
                   display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto",padding:14}}>

        {/* BACKDROP */}
        {phase==="backdrop"&&<>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",
                       color:C.red,marginBottom:8,fontFamily:FONT}}>Aircraft Outline</div>
          <div style={{fontSize:12,color:C.textMid,marginBottom:12,lineHeight:1.6,fontFamily:FONT}}>
            Choose a top-down silhouette matching your aircraft, or upload a reference image.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:14}}>
            {PRESETS.map(ap=><div key={ap.id} className="prow"
              onClick={()=>{setPresetId(ap.id);if(ap.id==="upload")fileRef.current?.click();}}
              style={{padding:"8px 10px",borderRadius:6,cursor:"pointer",
                      border:`1px solid ${presetId===ap.id?C.red:C.border}`,
                      background:presetId===ap.id?C.redGlowS:C.surface,
                      color:presetId===ap.id?C.textHi:C.textMid,
                      fontSize:12,fontFamily:FONT,transition:"all 0.15s"}}>
              {ap.label}
            </div>)}
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleUpload}/>
          {uploadImg&&<div style={{fontSize:11,color:C.success,fontFamily:FONT,marginBottom:8}}>✓ Image uploaded</div>}
          <div style={{marginTop:"auto"}}>
            <BtnPrimary style={{width:"100%"}} disabled={!bdReady} onClick={()=>setPhase("backbone")}>
              Next: Draw Backbone →
            </BtnPrimary>
          </div>
        </>}

        {/* BACKBONE */}
        {phase==="backbone"&&<>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",
                       color:C.red,marginBottom:8,fontFamily:FONT}}>Draw Backbone</div>
          <div style={{fontSize:12,color:C.textMid,marginBottom:10,lineHeight:1.7,fontFamily:FONT}}>
            Click to place points to build the backbone. Double-click or press Finish when done.
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,
                       padding:10,marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:C.textDim,textTransform:"uppercase",
                         letterSpacing:"0.1em",marginBottom:4,fontFamily:FONT}}>Status</div>
            {bb.length===0
              ? <div style={{fontSize:12,color:C.warn,fontFamily:FONT}}>Click canvas to start</div>
              : <div style={{fontSize:12,color:bb.length>1&&!placing?C.success:C.warn,fontFamily:FONT}}>
                  {bb.length} pt · {Math.max(0,bb.length-1)} seg
                  {placing&&<span style={{color:C.warn}}> · placing…</span>}
                </div>
            }
            {bb.length>=2&&!placing&&<div style={{marginTop:6,fontSize:11,color:C.textMid,fontFamily:FONT,lineHeight:1.5}}>
              Click a segment tag on the canvas to enter its length in inches. All segments must be dimensioned before continuing.
            </div>}
            {bbFullyDimensioned()&&<div style={{marginTop:6,fontSize:11,color:C.success,fontFamily:FONT}}>
              ✓ All segments dimensioned
            </div>}
          </div>
          <div style={{fontSize:10,color:C.textDim,fontFamily:FONT,marginBottom:8,lineHeight:1.5}}>
            Scroll to zoom · Alt+drag to pan
          </div>
          {placing&&bb.length>=2&&
            <button onClick={finishBb} style={{width:"100%",background:C.red,color:"#fff",
              border:"none",borderRadius:6,padding:"8px 0",fontSize:12,fontWeight:700,
              cursor:"pointer",fontFamily:FONT,marginBottom:8}}>
              ✓ Finish Backbone
            </button>}
          {bb.length>0&&
            <button onClick={resetBb} style={{width:"100%",background:"transparent",color:C.warn,
              border:`1px solid ${C.warn}`,borderRadius:6,padding:"7px 0",fontSize:12,
              fontWeight:700,cursor:"pointer",fontFamily:FONT,marginBottom:8}}>
              Reset
            </button>}
          <div style={{marginTop:"auto",display:"flex",flexDirection:"column",gap:8}}>
            <BtnPrimary style={{width:"100%"}} disabled={bb.length<2||placing||!bbFullyDimensioned()}
              onClick={()=>setPhase("nodes")}>Next: Add Nodes →</BtnPrimary>
            <BtnGhost style={{width:"100%"}} onClick={()=>setPhase("backdrop")}>← Back</BtnGhost>
          </div>
        </>}

        {/* NODES */}
        {phase==="nodes"&&<>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",
                       color:C.red,marginBottom:8,fontFamily:FONT}}>Nodes & Dimensions</div>
          <div style={{fontSize:11,color:C.textMid,marginBottom:10,lineHeight:1.6,fontFamily:FONT}}>
            Click near the backbone to add a node. All labels and dimensions required before submitting.
          </div>

          {/* Pending node */}
          {pending&&<div style={{background:C.surface,border:`1px solid ${C.red}`,
            borderRadius:8,padding:10,marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:C.red,letterSpacing:"0.1em",
                         textTransform:"uppercase",marginBottom:8,fontFamily:FONT}}>New Node</div>
            {(()=>{
              const isEp=bb.length>=2&&(
                Math.hypot(pending.x-bb[0].x,pending.y-bb[0].y)<18||
                Math.hypot(pending.x-bb[bb.length-1].x,pending.y-bb[bb.length-1].y)<18
              );
              return <>
                {isEp&&<div style={{background:"#fff3cd",border:"1px solid #e0a800",
                  borderRadius:5,padding:"6px 9px",marginBottom:8,
                  fontSize:10,color:"#7a4f00",fontFamily:FONT,lineHeight:1.4}}>
                  Backbone endpoint — no branch length required
                </div>}
                <Field label="Unit / Equipment Label">
                  <input autoFocus value={pending.label} placeholder="e.g. Garmin GTX 345"
                    onChange={e=>setPending(p=>({...p,label:e.target.value}))}/>
                </Field>
                {!isEp&&<Field label="Branch Length (inches)">
                  <input value={pending.len} placeholder="e.g. 12"
                    onChange={e=>setPending(p=>({...p,len:e.target.value}))}/>
                </Field>}
              </>;
            })()}
            <div style={{display:"flex",gap:6}}>
              <button onClick={confirmNode} style={{flex:1,background:C.red,color:"#fff",
                border:"none",borderRadius:5,padding:"7px 0",fontSize:12,fontWeight:700,
                cursor:"pointer",fontFamily:FONT}}>Add</button>
              <button onClick={()=>setPending(null)} style={{flex:1,background:"transparent",
                color:C.textMid,border:`1px solid ${C.border}`,borderRadius:5,
                padding:"7px 0",fontSize:12,cursor:"pointer",fontFamily:FONT}}>Cancel</button>
            </div>
          </div>}

          {/* Backbone dims note — now entered inline on canvas */}
          {bbSegs.length>0&&<div style={{background:C.surface,border:`1px solid ${C.border}`,
            borderRadius:6,padding:8,marginBottom:10}}>
            <div style={{fontSize:11,color:C.textMid,fontFamily:FONT,lineHeight:1.5}}>
              Click any segment dimension tag on the canvas to enter its length.
            </div>
          </div>}

          {/* Node list */}
          {nodes.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:C.textDim,letterSpacing:"0.1em",
                         textTransform:"uppercase",marginBottom:6,fontFamily:FONT}}>
              Nodes ({nodes.length})
            </div>
            {nodes.map(n=><div key={n.id}
              style={{background:C.surface,border:`1px solid ${editId===n.id?C.red:C.border}`,
                      borderRadius:6,padding:8,marginBottom:5,cursor:"pointer"}}
              onClick={()=>setEditId(editId===n.id?null:n.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                           marginBottom:editId===n.id?6:0}}>
                <span style={{fontSize:11,color:n.label?C.textHi:C.warn,fontWeight:700,
                              fontFamily:FONT,overflow:"hidden",textOverflow:"ellipsis",
                              whiteSpace:"nowrap",maxWidth:120}}>
                  {isEndpointNode(n)&&<span style={{color:C.red,fontSize:9,marginRight:4}}>EP</span>}

                  <button onClick={ev=>{ev.stopPropagation();removeNode(n.id);}}

      {/* ─── CANVAS ─── */}
      <div ref={containerRef} style={{flex:1,overflow:"hidden",background:"#ffffff",position:"relative"}}
        onClick={editSegIdx!==null?()=>{setEditSegIdx(null);setEditSegVal("");}:undefined}
        onWheel={handleWheel}
        onMouseDown={handleMouseDown}
        onMouseUp={handleMouseUp}
        onMouseLeave={handleMouseUp}>
        {/* Canvas overlay panel — Show/Hide controls, top-left */}
        {(phase==="backbone"||phase==="nodes")&&<div style={{
          position:"absolute",top:10,left:10,zIndex:100,
          background:"rgba(255,255,255,0.97)",
          border:"1px solid #ddd",borderRadius:8,
          boxShadow:"0 2px 12px rgba(0,0,0,0.13)",
          minWidth:220,overflow:"hidden"}}>
          {/* Panel header */}
          <div style={{background:"#1a1a1a",padding:"7px 12px",
                       display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:9,fontWeight:800,letterSpacing:"0.16em",
                          textTransform:"uppercase",color:"#ccc",fontFamily:FONT}}>
              Canvas Layers
            </span>
            <span style={{fontSize:9,color:"#666",fontFamily:FONT,letterSpacing:"0.06em"}}>
              Show / Hide
            </span>
          </div>
          {/* Toggle row helper */}
          {[
            {
              label:"Backbone Segment Dimensions",
              icon:"",
              active:showSegDims,
              onToggle:()=>setShowSegDims(v=>!v)
            }
            /* Future toggles can be added here as additional objects */
          ].map(({label,icon,active,onToggle})=>(
            <div key={label}
              onClick={onToggle}
              style={{display:"flex",alignItems:"center",gap:10,
                      padding:"8px 12px",cursor:"pointer",
                      borderTop:"1px solid #eee",
                      background:active?"#f8f8f8":"#fff",
                      transition:"background 0.15s"}}>
              {/* Toggle switch */}
              <div style={{
                width:32,height:18,borderRadius:9,flexShrink:0,
                background:active?"#222":"#ccc",
                position:"relative",transition:"background 0.2s"}}>
                <div style={{
                  position:"absolute",top:3,
                  left:active?14:3,
                  width:12,height:12,borderRadius:"50%",
                  background:"#fff",transition:"left 0.2s",
                  boxShadow:"0 1px 3px rgba(0,0,0,0.25)"}}>
                </div>
              </div>
              <span style={{fontSize:10,fontFamily:FONT,
                            color:active?"#222":"#888",
                            fontWeight:active?700:400,
                            lineHeight:1.3,flex:1}}>
                {icon} {label}
              </span>
            </div>
          ))}
        </div>}
        {/* Zoom controls */}
        <div style={{position:"absolute",bottom:12,right:12,zIndex:100,
                     display:"flex",flexDirection:"column",gap:4}}>
          <button onClick={()=>setZoom(z=>Math.min(8,z*1.3))}
            style={{width:28,height:28,background:"#fff",border:"1px solid #ccc",
                    borderRadius:5,fontSize:16,cursor:"pointer",lineHeight:"28px",
                    textAlign:"center",fontFamily:FONT,boxShadow:"0 1px 4px rgba(0,0,0,0.12)"}}>+</button>
          <button onClick={()=>setZoom(z=>Math.max(0.5,z/1.3))}
            style={{width:28,height:28,background:"#fff",border:"1px solid #ccc",
                    borderRadius:5,fontSize:16,cursor:"pointer",lineHeight:"28px",
                    textAlign:"center",fontFamily:FONT,boxShadow:"0 1px 4px rgba(0,0,0,0.12)"}}>−</button>
          <button onClick={resetView}
            style={{width:28,height:28,background:"#fff",border:"1px solid #ccc",
                    borderRadius:5,fontSize:10,cursor:"pointer",lineHeight:"28px",
                    textAlign:"center",fontFamily:FONT,boxShadow:"0 1px 4px rgba(0,0,0,0.12)",
                    color:"#555",fontWeight:700}}>[ ]</button>
          <div style={{fontSize:9,color:"#999",textAlign:"center",fontFamily:FONT,marginTop:2}}>
            {Math.round(zoom*100)}%
          </div>
        </div>
        <svg ref={svgRef} width="100%" height="100%"
          viewBox={`0 0 ${CW} ${CH}`} preserveAspectRatio="none"
          style={{display:"block",
                  cursor:draggingNode?"grabbing":panning?"grabbing":(phase==="backbone"||phase==="nodes")?"crosshair":"default"}}
          onClick={handleCanvasClick}
          onMouseMove={e=>{handleMouseMove(e);handlePanMove(e);}}
          onDoubleClick={phase==="backbone"&&placing?finishBb:undefined}>

          <defs>
            <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
              <circle cx="10" cy="10" r="0.8" fill="#ddd"/>
            </pattern>
            <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="6" stroke="#aaa" strokeWidth="1"/>
            </pattern>
            <filter id="pulse" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="1.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          {/* Static white background (outside zoom group) */}
          <rect width={CW} height={CH} fill="#ffffff"/>
          <rect width={CW} height={CH} fill="url(#dots)"/>
          {/* All zoomable content */}
          <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>

          {/* ── AIRCRAFT SILHOUETTE ── */}
          {acData&&<>
            <path d={acData.body}   fill="#c8c8c8" stroke="#222" strokeWidth={2} strokeLinejoin="round"/>
            <path d={acData.wingL}  fill="#c8c8c8" stroke="#222" strokeWidth={1.5} strokeLinejoin="round"/>
            <path d={acData.wingR}  fill="#c8c8c8" stroke="#222" strokeWidth={1.5} strokeLinejoin="round"/>
            <path d={acData.stabL}  fill="#c8c8c8" stroke="#222" strokeWidth={1.5} strokeLinejoin="round"/>
            <path d={acData.stabR}  fill="#c8c8c8" stroke="#222" strokeWidth={1.5} strokeLinejoin="round"/>
            {acData.fin&&<path d={acData.fin} fill="#c8c8c8" stroke="#222" strokeWidth={1.5}/>}
            {acData.extras&&acData.extras.map((d,i)=>
              <path key={i} d={d} fill="#555" stroke="#222" strokeWidth={1}/>)}
            {/* Centerline */}
            <line x1="350" y1="10" x2="350" y2={CH-10}
              stroke="#aaa" strokeWidth={0.5} strokeDasharray="4 4"/>

          </>}

          {/* Uploaded image */}
          {uploadImg&&presetId==="upload"&&
            <image href={uploadImg} x={0} y={0} width={CW} height={CH}
              preserveAspectRatio="xMidYMid meet" opacity={0.35}/>}

          {/* ── BACKBONE ── */}
          {bb.length>1&&bb.slice(0,-1).map((_,i)=>
            <line key={i} x1={bb[i].x} y1={bb[i].y} x2={bb[i+1].x} y2={bb[i+1].y}
              stroke="#111" strokeWidth={3.5} strokeLinecap="round"/>
          )}
          {/* Backbone vertices */}
          {bb.map((p,i)=>
            <circle key={i} cx={p.x} cy={p.y} r={i===0||i===bb.length-1?5:3.5}
              fill="#111" stroke="#fff" strokeWidth={1.5}/>
          )}

          {/* Snap preview */}
          {preview&&bb.length>0&&<>
            <line x1={bb[bb.length-1].x} y1={bb[bb.length-1].y}
              x2={preview.x} y2={preview.y}
              stroke="#777" strokeWidth={2} strokeDasharray="6 4"/>
            <circle cx={preview.x} cy={preview.y} r={4}
              fill="none" stroke="#777" strokeWidth={1.5}/>

          </>}

          {/* Segment dimension tags — clickable in backbone AND nodes phases */}
          {(phase==="backbone"||phase==="nodes")&&showSegDims&&segMids.map((m,i)=>{
            const v=bbSegs[i]?.in;
            const ok=v&&v.trim();
            const editing=editSegIdx===i;
            // Compute perpendicular offset so tag doesn't overlap backbone
            const seg=bb[i]&&bb[i+1]?{dx:bb[i+1].x-bb[i].x,dy:bb[i+1].y-bb[i].y}:{dx:0,dy:1};
            const segLen=Math.hypot(seg.dx,seg.dy)||1;
            const perpX=-seg.dy/segLen*14, perpY=seg.dx/segLen*14;
            const tx=m.x+perpX, ty=m.y+perpY;
            if(editing) return (
              <g key={i}>
                <rect x={tx-24} y={ty-13} width={48} height={16} rx={4}
                  fill="#fffbe6" stroke="#ff3131" strokeWidth={2}/>
                <text x={tx} y={ty-2} textAnchor="middle" fontFamily={FONT}
                  fontSize={9} fill="#ff3131" fontWeight="700">
                  {editSegVal||"type…"}
                </text>
              </g>
            );
            return <g key={i} style={{cursor:"pointer"}}
              onClick={e=>{e.stopPropagation();setEditSegIdx(i);setEditSegVal(v||"");}}>
              <rect x={tx-24} y={ty-13} width={48} height={16} rx={4}
                fill="#fff" stroke={ok?"#228b22":"#ff3131"} strokeWidth={ok?1:1.5}
                filter={ok?"none":"url(#pulse)"}/>
              <text x={tx} y={ty-2} textAnchor="middle" fontFamily={FONT}
                fontSize={9} fill={ok?"#228b22":"#ff3131"} fontWeight="700">
                {ok?`${v}″`:"XXX"}
              </text>
            </g>;
          })}

          {/* ── NODES ── */}
          {nodes.map(n=>{
            const epNode = isEndpointNode(n);
            // Use visualBranchPx if set (aesthetic drag), otherwise derive from n.len
            const dataBranchPx = epNode ? 0 : (n.len ? parseFloat(n.len)*PX_PER_IN : 24);
            const branchPx = n.visualBranchPx !== undefined ? n.visualBranchPx : dataBranchPx;
            const pd = n.perpDir || {dx:0,dy:-1};
            const bx = n.x + pd.dx*branchPx;
            const by = n.y + pd.dy*branchPx;
            const labelOk = n.label.trim();
            const lenOk   = epNode || !!n.len.trim();
            const complete = labelOk && lenOk;

            // Leader line: straight from branch tip (or backbone dot for endpoints)
            // to the draggable callout box — no intermediate elbow or dashed stub.
            // Default box offset: 60px along perp + 50px horizontal
            const jogDir = pd.dx >= 0 ? 1 : -1;
            const off = n.boxOffset || {dx:0,dy:0};
            // Default callout position (relative to branch endpoint or backbone dot)
            const defBoxCx = bx + pd.dx*20 + jogDir*50;
            const defBoxCy = by + pd.dy*20;
            const lx2 = defBoxCx + off.dx;
            const ly2 = defBoxCy + off.dy;
            // Leader origin: branch tip for normal nodes, backbone dot for endpoints
            const lx1 = bx;
            const ly1 = by;

            // Callout box sizing
            const charW = 6.2;
            const labelText = n.label || "—";
            const lenText   = epNode ? "endpoint" : (n.len ? `${n.len}″` : "?″");
            const boxW  = Math.max(labelText.length*charW+20, lenText.length*charW+20, 68);
            const boxH  = epNode ? 18 : 30;
            // Box centred on (lx2, ly2)
            const boxX  = lx2 - boxW/2;
            const boxY  = ly2 - boxH/2;

            const boxStroke = complete ? "#228b22" : "#cc8800";
            const boxFill   = complete ? "#f4faf4" : "#fffaf0";
            const isDraggingThisBox = draggingBox?.id === n.id;

            return <g key={n.id}>
              {/* Proportional branch line */}
              {!epNode&&<line x1={n.x} y1={n.y} x2={bx} y2={by}
                stroke="#333" strokeWidth={2.5} strokeLinecap="round"/>}

              {/* Leader: single solid line from branch tip (or backbone dot) to callout */}
              <line x1={lx1} y1={ly1} x2={lx2} y2={ly2}
                stroke="#888" strokeWidth={1}/>

              {/* Draggable callout box */}
              <g style={{cursor:isDraggingThisBox?"grabbing":"grab"}}
                onMouseDown={e=>{
                  e.stopPropagation();
                  setDraggingBox({id:n.id,
                    startMx:e.clientX,startMy:e.clientY,
                    origDx:off.dx,origDy:off.dy});
                }}>
                <rect x={boxX} y={boxY} width={boxW} height={boxH} rx={4}
                  fill={boxFill}
                  stroke={isDraggingThisBox?"#ff3131":boxStroke}
                  strokeWidth={isDraggingThisBox?1.8:1.2}
                  style={{filter:isDraggingThisBox?"drop-shadow(0 2px 4px rgba(0,0,0,0.18))":"none"}}/>

                {/* Move handle — top-right corner dot */}
                <circle cx={boxX+boxW-5} cy={boxY+5} r={3}
                  fill={isDraggingThisBox?"#ff3131":"#bbb"}/>

                {/* Label — top line */}
                <text x={boxX+boxW/2} y={boxY+(epNode?boxH/2+3.5:11)}
                  textAnchor="middle" fontFamily={FONT}
                  fontSize={9} fontWeight="700" fill={labelOk?"#111":"#cc8800"}
                  style={{pointerEvents:"none",userSelect:"none"}}>
                  {labelText}
                </text>

                {/* Length — bottom line */}
                {!epNode&&<text x={boxX+boxW/2} y={boxY+24}
                  textAnchor="middle" fontFamily={FONT}
                  fontSize={8} fontWeight="600"
                  fill={n.len?"#228b22":"#cc8800"}
                  style={{pointerEvents:"none",userSelect:"none"}}>
                  {lenText}
                </text>}
              </g>

              {/* Node dot — drag along backbone to reposition */}
              <circle cx={n.x} cy={n.y} r={4}
                fill={epNode?"#cc2020":"#222"} stroke="#fff" strokeWidth={1.5}
                style={{cursor:draggingNode===n.id?"grabbing":"grab"}}
                onMouseDown={e=>{
                  e.stopPropagation();
                  nodeDragMoved.current=false;
                  setDraggingNode(n.id);
                }}/>
              {/* Slide indicator removed — dot is small enough */}

              {/* Branch tip handle — click to flip, drag to resize length */}
              {!epNode&&<>
                <circle cx={bx} cy={by} r={6}
                  fill="#444" stroke="#fff" strokeWidth={1.5}
                  style={{cursor:draggingBranch===n.id?"ns-resize":"pointer"}}
                  onMouseDown={e=>{
                    e.stopPropagation();
                    setDraggingBranch(n.id);
                  }}
                  onClick={e=>{
                    e.stopPropagation();
                    // Flip to opposite perp side
                    updNode(n.id,"perpDir",{dx:-pd.dx,dy:-pd.dy});
                  }}/>
                <text x={bx} y={by+3} textAnchor="middle"
                  fontFamily={FONT} fontSize={7} fill="#fff" fontWeight="700"
                  style={{pointerEvents:"none",userSelect:"none"}}>
                  
                </text>
              </>}
            </g>;
          })}

          {/* Pending node preview */}
          {pending&&(()=>{
            const epPend = bb.length>=2&&(
              Math.hypot(pending.x-bb[0].x,pending.y-bb[0].y)<18||
              Math.hypot(pending.x-bb[bb.length-1].x,pending.y-bb[bb.length-1].y)<18
            );
            const pd = pending.perpDir || {dx:0,dy:-1};
            const px2 = pending.x + pd.dx*28;
            const py2 = pending.y + pd.dy*28;
            return <g>
              <circle cx={pending.x} cy={pending.y} r={8}
                fill="#ff3131" stroke="#fff" strokeWidth={2} opacity={0.9}/>
              {epPend&&<text x={pending.x} y={pending.y-14} textAnchor="middle"
                fontFamily={FONT} fontSize={8} fill="#cc2020" fontWeight="700">ENDPOINT</text>}
            </g>;
          })()}

          {/* Endpoint requirement rings */}
          {phase==="nodes"&&bb.length>=2&&(()=>{
            const SNAP=18;
            const hasStart=nodes.some(n=>Math.hypot(n.x-bb[0].x,n.y-bb[0].y)<SNAP);
            const hasEnd  =nodes.some(n=>Math.hypot(n.x-bb[bb.length-1].x,n.y-bb[bb.length-1].y)<SNAP);
            return <>
              {!hasStart&&<>
                <circle cx={bb[0].x} cy={bb[0].y} r={14}
                  fill="none" stroke="#ff3131" strokeWidth={2} strokeDasharray="4 2" opacity={0.8}/>
                <text x={bb[0].x} y={bb[0].y-18} textAnchor="middle"
                  fontFamily={FONT} fontSize={9} fill="#ff3131" fontWeight="700">REQUIRED</text>
              </>}
              {!hasEnd&&<>
                <circle cx={bb[bb.length-1].x} cy={bb[bb.length-1].y} r={14}
                  fill="none" stroke="#ff3131" strokeWidth={2} strokeDasharray="4 2" opacity={0.8}/>
                <text x={bb[bb.length-1].x} y={bb[bb.length-1].y-18} textAnchor="middle"
                  fontFamily={FONT} fontSize={9} fill="#ff3131" fontWeight="700">REQUIRED</text>
              </>}
            </>;
          })()}

          {/* Empty state hints */}
          {phase==="backdrop"&&!presetId&&
            <text x={CW/2} y={CH/2} textAnchor="middle" fontFamily={FONT}
              fill="#aaa" fontSize={14} fontWeight="600">← Select an aircraft outline to begin</text>}
          {phase==="backbone"&&bb.length===0&&
            <text x={CW/2} y={CH/2} textAnchor="middle" fontFamily={FONT}
              fill="#aaa" fontSize={14} fontWeight="600">Click to place first backbone point</text>}
          {phase==="nodes"&&!nodes.length&&!pending&&
            <text x={CW/2} y={CH/2+24} textAnchor="middle" fontFamily={FONT}
              fill="#aaa" fontSize={14} fontWeight="600">Click near the backbone to add a node</text>}

          </g>{/* end zoom group */}
          {/* Watermark — outside zoom, always at corner */}
          <text x={CW-6} y={CH-5} textAnchor="end" fontFamily={FONT}
            fill="#ccc" fontSize={7.5} letterSpacing="0.08em">
            Leading Edge Aero, LLC · Wiring Harness Layout
          </text>
        </svg>
        {/* Floating input overlay for segment dimension editing */}
        {editSegIdx!==null&&(()=>{
          const i=editSegIdx;
          const m=segMids[i];
          if(!m) return null;
          const seg=bb[i]&&bb[i+1]?{dx:bb[i+1].x-bb[i].x,dy:bb[i+1].y-bb[i].y}:{dx:0,dy:1};
          const segLen=Math.hypot(seg.dx,seg.dy)||1;
          const perpX=-seg.dy/segLen*14, perpY=seg.dx/segLen*14;
          const tx=m.x+perpX, ty=m.y+perpY;
          // Map SVG coords → container percent
          const svgEl=svgRef.current;
          const rect=svgEl?.getBoundingClientRect();
          const containerEl=svgEl?.parentElement;
          const cr=containerEl?.getBoundingClientRect();
          if(!rect||!cr) return null;
          const scaleX=rect.width/700, scaleY=rect.height/440;
          const px=(rect.left-cr.left)+tx*scaleX;
          const py=(rect.top -cr.top) +ty*scaleY;
          const commit=val=>{updSeg(i,val);setEditSegIdx(null);setEditSegVal("");};
          return (
            <div style={{position:"absolute",left:px-36,top:py-16,zIndex:200,
                         pointerEvents:"all"}}
              onClick={e=>e.stopPropagation()}>
              <input
                autoFocus
                value={editSegVal}
                onChange={e=>setEditSegVal(e.target.value)}
                onBlur={e=>commit(e.target.value)}
                onKeyDown={e=>{
                  if(e.key==="Enter") commit(e.target.value);
                  if(e.key==="Escape"){setEditSegIdx(null);setEditSegVal("");}
                }}
                style={{width:72,height:24,fontSize:12,fontFamily:FONT,fontWeight:700,
                        textAlign:"center",border:"2px solid #ff3131",borderRadius:5,
                        background:"#fff",color:"#111",padding:"0 6px",
                        outline:"none",boxShadow:"0 2px 12px rgba(0,0,0,0.18)"}}
                placeholder="inches"
              />
              <div style={{fontSize:9,color:"#555",textAlign:"center",
                           marginTop:2,fontFamily:FONT}}>Enter · Esc to cancel</div>
            </div>
          );
        })()}
      </div>
    </div>
  </div>;
}

        Questions? Call{" "}

        {" "}or email{" "}

  const rows=[

  return <div className="fu" style={{maxWidth:900,margin:"44px auto",padding:"0 24px"}}>
    <div style={{marginBottom:36}}>
      <h1 style={{fontSize:26,fontWeight:800,marginBottom:8,fontFamily:FONT}}>Review & Submit</h1>
      <p style={{color:C.textMid,fontSize:14,fontFamily:FONT}}>Confirm your information before sending to our sales team.</p>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <Card>
        <RedBar text="Aircraft & Contact Summary"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          {rows.map(([k,v])=><div key={k} style={{background:C.bgDeep,borderRadius:7,
                                                   padding:"10px 14px",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:9,fontWeight:700,color:C.textDim,letterSpacing:"0.14em",
                         textTransform:"uppercase",marginBottom:3,fontFamily:FONT}}>{k}</div>
            <div style={{fontSize:13,color:C.textHi,fontWeight:600,fontFamily:FONT}}>{v||"—"}</div>
          </div>)}
        </div>
        {aircraft.notes&&<div style={{background:C.bgDeep,borderRadius:7,padding:"10px 14px",
                                       border:`1px solid ${C.border}`}}>
          <div style={{fontSize:9,fontWeight:700,color:C.textDim,letterSpacing:"0.14em",
                       textTransform:"uppercase",marginBottom:3,fontFamily:FONT}}>Project Notes</div>
          <div style={{fontSize:13,color:C.textMid,lineHeight:1.6,fontFamily:FONT}}>{aircraft.notes}</div>
        </div>}
      </Card>
      <Card>
        <RedBar text="Harness Design Summary"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
          {[
            ["Aircraft",     PRESETS.find(p=>p.id===harness.backdropId)?.label||"Custom"],
            ["BB Segments",  harness.bbSegs?.length||0],
            ["Nodes",        harness.nodes?.length||0],
          ].map(([k,v])=><div key={k} style={{background:C.bgDeep,borderRadius:7,padding:"12px 16px",
                                               border:`1px solid ${C.border}`,textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,color:C.red,lineHeight:1,fontFamily:FONT}}>{v}</div>
            <div style={{fontSize:11,color:C.textMid,marginTop:4,fontFamily:FONT}}>{k}</div>
          </div>)}
        </div>
        {harness.nodes?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {harness.nodes.map(n=><div key={n.id} style={{background:C.bgDeep,
            border:`1px solid ${C.border}`,borderRadius:5,padding:"4px 10px",
            fontSize:11,color:C.textMid,fontFamily:FONT}}>
            ● {n.label} ({n.len}″)
          </div>)}
        </div>}
      </Card>
      <Card>
        <RedBar text="Additional Notes for Sales"/>
        <Field label="Anything else for our team?">
          <textarea rows={3} value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Budget range, timeline, questions about specific equipment…"
            style={{resize:"vertical"}}/>
        </Field>
      </Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:36}}>
        <BtnGhost onClick={onBack}>← Back to Designer</BtnGhost>
        <BtnPrimary onClick={()=>setDone(true)}>Submit to Sales Team</BtnPrimary>
      </div>
    </div>
  </div>;
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
